allowBuilds:
  "@swc/core": true
  esbuild: true
  msw: true
  protobufjs: true
  unrs-resolver: true
# 5 days delay
minimumReleaseAge: 7200
minimumReleaseAgeExclude:
  - "@dukelib/sheets-wasm@0.1.21"
  - "@extend-ai/react-xlsx@0.15.0"
overrides:
  # A lot of packages depend on it, they make a lot of major version bumps and most are just about build env/packaging.
  uuid: 14.0.0
  # Dependency of `react-use`; See https://github.com/streamich/react-use & ERMAIN-327
  # Is only used on codepath that we don't use.
  js-cookie: 3.0.7
  # Storybook 8.6.x docs packages pull a separate react@19.0.0 subtree; force dedupe onto the app version.
  react: 19.2.7
  react-dom: 19.2.7
  # react-markdown -> mdast-util-to-hast pulls 1.3.0, deprecated for CWE-502; 1.3.1 is the patched release.
  "@ungap/structured-clone": "^1.3.1"
