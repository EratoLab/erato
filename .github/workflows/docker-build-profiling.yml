name: Build and Push Profiling Docker Images
run-name: Build profiling images for ${{ inputs.git_sha }}

on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: Full Git SHA to build (the matching amd64 frontend image must already exist)
        required: true
        type: string

env:
  REGISTRY: registry.eratolabs.com
  BACKEND_IMAGE_NAME: erato/backend
  FRONTEND_IMAGE_NAME: erato/frontend
  COMBINED_IMAGE_NAME: erato/app
  SHA_TAG: ${{ inputs.git_sha }}

jobs:
  build-and-push-profiling-linux:
    runs-on: ubuntu-24.04 # blacksmith-8vcpu-ubuntu-2404
    permissions:
      contents: read

    steps:
      - name: Validate Git SHA
        env:
          GIT_SHA: ${{ inputs.git_sha }}
        run: |
          if [[ ! "$GIT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::git_sha must be a full 40-character lowercase Git SHA"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_sha }}

      - name: Log in to Erato Labs registry
        uses: docker/login-action@v3.6.0
        with:
          registry: registry.eratolabs.com
          username: ${{ secrets.ERATOLABS_REGISTRY_USERNAME }}
          password: ${{ secrets.ERATOLABS_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend profiling image
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          build-args: |
            ERATO_FEATURES=profiling
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest-profiling
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ env.SHA_TAG }}-profiling
          cache-from: type=registry,image-manifest=true,ref=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest-profiling-buildcache
          cache-to: type=registry,image-manifest=true,mode=max,ref=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest-profiling-buildcache

      - name: Build and push Combined profiling image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          file: ./Dockerfile.combined
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.COMBINED_IMAGE_NAME }}:latest-profiling
            ${{ env.REGISTRY }}/${{ env.COMBINED_IMAGE_NAME }}:${{ env.SHA_TAG }}-profiling
          build-args: |
            REGISTRY=${{ env.REGISTRY }}
            BACKEND_IMAGE=${{ env.BACKEND_IMAGE_NAME }}:${{ env.SHA_TAG }}-profiling
            FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE_NAME }}:${{ env.SHA_TAG }}-amd64
          cache-from: type=registry,image-manifest=true,ref=${{ env.REGISTRY }}/${{ env.COMBINED_IMAGE_NAME }}:latest-profiling-buildcache
          cache-to: type=registry,image-manifest=true,mode=max,ref=${{ env.REGISTRY }}/${{ env.COMBINED_IMAGE_NAME }}:latest-profiling-buildcache
