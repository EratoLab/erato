# Many models test scenario - provides a large model list for selector testing
# This scenario is used to test model selector behavior with many models

[chat_providers.providers.mock-llm-openai]
provider_kind = "openai"
model_name = "placeholder"
model_display_name = "Mock-LLM"
base_url = "http://erato-local-mock-llm-server:44320/base-openai/v1/placeholder"

[mcp_servers_global]
max_session_idle_seconds = 3600

[mcp_servers.mock_mcp_progress]
transport_type = "streamable_http"
url = "http://erato-local-mock-mcp-server:44321/mcp/progress"

[mcp_servers.mock_mcp_auth_none]
transport_type = "streamable_http"
url = "http://erato-local-mock-mcp-server:44321/mcp/auth-none"

[mcp_servers.mock_mcp_auth_none.authentication]
mode = "none"

[mcp_servers.mock_mcp_auth_forwarded_access]
transport_type = "streamable_http"
url = "http://erato-local-mock-mcp-server:44321/mcp/auth-forwarded-access"

[mcp_servers.mock_mcp_auth_forwarded_access.authentication]
mode = "forwarded"

[mcp_servers.mock_mcp_auth_forwarded_access.authentication.forwarded]
credential = "access_token"

[mcp_servers.mock_mcp_auth_forwarded_oidc]
transport_type = "streamable_http"
url = "http://erato-local-mock-mcp-server:44321/mcp/auth-forwarded-oidc"

[mcp_servers.mock_mcp_auth_forwarded_oidc.authentication]
mode = "forwarded"

[mcp_servers.mock_mcp_auth_forwarded_oidc.authentication.forwarded]
credential = "oidc_id_token"

[mcp_servers.mock_mcp_auth_fixed]
transport_type = "streamable_http"
url = "http://erato-local-mock-mcp-server:44321/mcp/auth-fixed"

[mcp_servers.mock_mcp_auth_fixed.authentication]
mode = "fixed"

[mcp_servers.mock_mcp_auth_fixed.authentication.fixed]
api_key = "fixed-api-key-secret"

[mcp_server_permissions.rules.allow_mock_mcp_progress_for_all]
rule_type = "allow-all"
mcp_server_ids = ["mock_mcp_progress"]

[mcp_server_permissions.rules.allow_mock_mcp_auth_none_for_group]
rule_type = "allow-for-group-members"
mcp_server_ids = ["mock_mcp_auth_none"]
groups = ["mcp-auth-none"]

[mcp_server_permissions.rules.allow_mock_mcp_auth_fixed_for_group]
rule_type = "allow-for-group-members"
mcp_server_ids = ["mock_mcp_auth_fixed"]
groups = ["mcp-auth-fixed"]

[mcp_server_permissions.rules.allow_mock_mcp_auth_forwarded_access_for_group]
rule_type = "allow-for-group-members"
mcp_server_ids = ["mock_mcp_auth_forwarded_access"]
groups = ["mcp-auth-forwarded-access"]

[mcp_server_permissions.rules.allow_mock_mcp_auth_forwarded_oidc_for_group]
rule_type = "allow-for-group-members"
mcp_server_ids = ["mock_mcp_auth_forwarded_oidc"]
groups = ["mcp-auth-forwarded-oidc"]

[frontend.additional_environment]
K3D_TEST_SCENARIO = "many-models"
